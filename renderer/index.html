<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; img-src 'self' data: https: http: crx: chrome-extension:; style-src 'self' 'unsafe-inline'; script-src 'self'">
  <title>Drift</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="viewport">
    <div id="bg">
      <img id="bgimg" alt="">
      <div id="bgscrim"></div>
    </div>
    <div id="grid"></div>

    <div id="world">
      <div id="zones"></div>
      <svg id="edges">
        <g id="edgeG" fill="none" stroke-linecap="round"></g>
      </svg>
      <div id="cards"></div>
    </div>

    <div id="toolbar">
      <div class="tgroup">
        <div class="brand"><img id="brandlogo" src="logo.png" alt="">DRIFT</div>
        <button id="btnNew" title="New card (⌘T) · Find (⌘F)">＋ New card</button>
        <button id="btnZone" title="New zone (⇧⌘N)">▢ Zone</button>
        <button id="btnTidy" title="Arrange cards by trail (⇧⌘T)">Tidy</button>
        <button id="btnFit" title="Fit everything (⌘0)">Fit</button>
        <button id="btnBookmarks" title="Bookmarks">★</button>
        <!-- Vault is built but hidden until it's hardened for real use.
             Remove the `hidden` class (and see VAULT_ENABLED in app.js) to re-activate. -->
        <button id="btnVault" class="hidden" title="Password vault">🔒</button>
      </div>
      <div class="tspacer"></div>
      <div class="tgroup hidden" id="updateG">
        <button id="btnUpdate"></button>
        <button id="btnUpdateDismiss" title="Dismiss">×</button>
      </div>
      <div class="tgroup hidden" id="fullExitG">
        <button id="btnFullUrl" title="Edit address (⌘L)"></button>
        <button id="btnFullExit">⛶ Exit · esc</button>
      </div>
      <div class="tspacer"></div>
      <div class="tgroup">
        <button id="btnZoomOut" title="Zoom out (⌘−)">−</button>
        <button id="btnZoomIn" title="Zoom in (⌘+)">＋</button>
        <span id="extslot"></span>
        <button id="btnAI" class="aibtn" title="Assistant — chat with your canvas">✦ Assistant</button>
        <button id="btnExt" title="Get extensions from the Chrome Web Store">🧩</button>
        <button id="btnSettings" title="Settings">⚙</button>
        <button id="btnHelp" title="Walkthrough">?</button>
        <div id="zoomPct">100%</div>
      </div>
    </div>

    <div id="empty" class="hidden">
      <div class="bigmark">◍</div>
      <div>Press <kbd>⌘T</kbd> to open your first page</div>
      <div class="sub">scroll to pan · pinch to zoom · double-click a card to focus</div>
    </div>

    <canvas id="minimap" width="360" height="240"></canvas>

    <div id="palette" class="hidden">
      <div id="palBox" class="no-pan">
        <input id="palInput" placeholder="Search your canvas, or enter an address…" spellcheck="false" autocomplete="off">
        <div id="palResults" class="hidden"></div>
        <div class="palHint" id="palHint">↵ open on the canvas · ↑↓ jump to a matching card · esc cancel</div>
      </div>
    </div>

    <div id="bmpanel" class="hidden no-pan">
      <div class="bmhead"><span>Bookmarks</span>
        <span class="bmhbtns">
          <button id="btnBmImport" title="Import bookmarks from an HTML file">Import</button>
          <button id="btnBmExport" title="Export bookmarks to an HTML file">Export</button>
          <button id="btnBmFolder" title="New folder">+ Folder</button>
          <button id="btnBmClear" title="Remove all bookmarks">Clear all</button>
        </span>
      </div>
      <div id="bmlist"></div>
      <div class="bmfoot">click to open · × to remove · ☆ on any card to add</div>
    </div>

    <div id="vaultpanel" class="hidden no-pan"></div>
    <div id="setpanel" class="hidden no-pan"></div>

    <div id="ctx" class="hidden no-pan"></div>
    <div id="toast"></div>

    <div id="tour" class="hidden no-pan">
      <div id="tourSpot"></div>
      <div id="tourCard">
        <div id="tourStepNum"></div>
        <div id="tourTitle"></div>
        <div id="tourBody"></div>
        <div class="tourbtns">
          <button id="tourSkip">Skip tour</button>
          <div class="tspacer"></div>
          <button id="tourBack" class="hidden">‹ Back</button>
          <button id="tourNext">Next ›</button>
        </div>
      </div>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
