<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="t" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity=".95"/>
    </linearGradient>
    <radialGradient id="bgrad" cx="40%" cy="34%" r="82%">
      <stop offset="0" stop-color="#2A2018"/><stop offset="1" stop-color="#120D09"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".16"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- squircle body with macOS-style transparent margin -->
  <rect x="100" y="100" width="824" height="824" rx="188" fill="url(#bgrad)"/>
  <!-- faint stars -->
  <circle cx="252" cy="236" r="3.2" fill="#fff" opacity=".5"/>
  <circle cx="812" cy="286" r="2.6" fill="#fff" opacity=".42"/>
  <circle cx="726" cy="792" r="3" fill="#fff" opacity=".33"/>
  <circle cx="300" cy="820" r="2.2" fill="#fff" opacity=".3"/>
  <!-- soft halo behind the core -->
  <circle cx="512" cy="512" r="235" fill="url(#glow)"/>
  <!-- Orbit mark in white (scaled x5 from the 120-unit master, centred on 512,512) -->
  <g transform="translate(212,202) scale(5)">
    <ellipse cx="60" cy="62" rx="46" ry="20" transform="rotate(-24 60 62)"
             fill="none" stroke="#ffffff" stroke-width="4" opacity=".5"/>
    <path d="M 68 42 A 42 20 -24 0 1 90 34" fill="none"
          stroke="url(#t)" stroke-width="5.5" stroke-linecap="round"/>
    <circle cx="60" cy="62" r="15" fill="#ffffff"/>
    <circle cx="92" cy="33" r="9" fill="#ffffff"/>
  </g>
</svg>
